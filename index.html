":"서운동부","name":"정세영","place":"내혜홀 공원","situation":"벤치에 앉아 에어로빅을 구경하고 계신 연로한 아주머니와 자연스럽게 대화를 나눔.","response":"벤치에 앉아 에어로빅을 구경하고 계신 80대 정도의 아주머니를 보고 옆에 앉아 말을 건넸습니다.\n\n식사는 하셨는지, 어디에 사시는지 등 일상적인 이야기를 나누던 중, 아주머니께서 오히려 제게 부모님은 건강하시냐고 물어보셨습니다.\n\n부모님께서 아프셨던 적이 있다고 말씀드리자 아주머니께서는 안타까워하시며 요즘은 나이와 상관없이 아픈 사람이 너무 많은 것 같다고 말씀하셨습니다.\n\n그 말씀에 공감하며 \"모든 사람이 아프지 않고 건강하게 살 수 있다면 얼마나 좋을까요?\"라고 여쭈었더니, 아주머니께서도 \"그러면 정말 좋지.\"라고 공감해 주셨습니다.\n\n다만 곧 다른 화제로 이야기를 돌리셔서 성경을 보여드릴 기회는 갖지 못했습니다. 이후에도 편안한 분위기에서 대화를 이어가다가 전시대 교대 시간이 되어 인사를 드리고 자리를 떠났습니다.","feeling":"생각보다 공원에 사람이 없었는데 그래도 아주머니와 대화를 나눌 수 있어서 좋았습니다","keyword":"대화"},{"id":"6월 경험담-64","month":"6월 경험담","num":64,"date":"2026-06-24","cong":"서운서부","name":"김석희","place":"전시대 건너편 정류장","situation":"버스를 기다리던 젊은 여성과 자연스럽게 대화를 나눔.","response":"버스를 기다리던 젊은 여성에게 어디에서 오셨는지 여쭤보니 서울에서 왔다고 하셨습니다.\n\n서울 사람답게 세련되고 아름다운 분위기가 느껴진다고 진심으로 칭찬해 드렸고, 편안한 분위기 속에서 대화가 시작되었습니다.\n\n이후 건너편 중앙분리대에 무성하게 자란 풀을 가리키며, 작품처럼 아름답고 생명력이 참 대단한 것 같다고 이야기했습니다. 그러면서 \"저런 생명이 저절로 생겼을까요?\"라고 질문을 드렸습니다.\n\n상대방은 그런 점은 한 번도 생각해 본 적이 없다고 하였습니다.\n\n그래서 사람의 몸이 얼마나 정교하고 놀랍게 만들어졌는지에 대해 간단히 이야기한 뒤, 생명이 정말 저절로 생겨날 수 있을지 다시 한번 생각해 보도록 질문을 던졌습니다.\n\n상대방은 미소를 지으며 웃음으로 답해 주었지만, 그때 버스정류장에 사람들이 많이 모여들어 대화를 더 이어가지는 못했습니다.","feeling":"헤어짐의  인사를 인상적으로 못 해 마무리가 아쉬웠습니다","keyword":"대화"},{"id":"6월 경험담-65","month":"6월 경험담","num":65,"date":"2026-06-24","cong":"서운서부","name":"김석희","place":"전시대 건너편 정류장","situation":"안성에서 오래 거주하신 천주교 신자인 할머니와 자연스럽게 대화를 나눔.","response":"버스정류장에서 안성 토박이이신 천주교 신자 할머니를 만나 대화를 나누었습니다.\n\n이야기를 나누던 중 \"하느님 아버지의 이름을 알고 계세요?\"라고 여쭤보았는데, 잘 모르신다고 하셨습니다.\n\n그래서 성경에는 하느님의 이름이 **'여호와'**라고 알려져 있다는 점을 간단히 말씀드렸습니다.\n\n이후 가끔 만나 뵙게 되면 성경 이야기를 조금씩 나누고 싶다고 말씀드렸지만, 할머니께서는 정중하게 괜찮다고 하시며 사양하셨습니다.","feeling":"그냥 구면이니 서로 친하게  지내자고 할껄  아쉽습니다","keyword":"대화"},{"id":"6월 경험담-66","month":"6월 경험담","num":66,"date":"2026-06-24","cong":"서운서부","name":"김석희","place":"전시대 건너편 정류장","situation":"버스를 기다리던 중학생들과 자연스럽게 대화를 나눔.","response":"버스정류장에 앉아 있던 중학생 친구들과 자연스럽게 이야기를 나누게 되었습니다.\n\n학생들이 농담으로 연예인인 줄 알았다며 잘생겼다고 말해 주어서 웃으며 감사하다고 답했습니다.\n\n이후 길 건너편 전시대를 가리키며 저곳에서 자원봉사를 하고 있다고 이야기했는데, 학생들은 전시대가 무엇인지 잘 모른다고 했습니다.\n\n그래서 전시대에 있는 「스트레스에서 벗어날 수 있는가?」라는 출판물을 소개하며, 시험 기간이라 많이 힘들지 않겠냐고 공감했습니다.\n\n학생들은 시험 때문에 스트레스를 많이 받는다고 했고, 저는 \"저는 이제 시험을 보지 않아서 지금이 제일 좋네요.\"라고 웃으며 이야기했습니다.\n\n이어 스트레스를 관리하는 데 도움이 되는 좋은 내용들이 전시대에 있으니 지나가다가 한번 들러 보라고 권했습니다.","feeling":"그냥 말을 걸었더니   대화로 이어지는 것을 느꼈습니다","keyword":"대화"},{"id":"6월 경험담-67","month":"6월 경험담","num":67,"date":"2026-06-24","cong":"안성남부","name":"최보람","place":"한경대 내 카페테리아","situation":"가두 증거 중 카페테리아에서 그림을 그리고 계신 두 분의 화가와 자연스럽게 대화를 나눔.","response":"가두 증거를 하던 중 카페테리아에서 50대 후반에서 60대 초반 정도로 보이는 여성 두 분이 그림을 그리고 계셨습니다.\n\n그림이 너무 인상적이어서 가까이 다가가 구경해도 되는지 여쭤보았더니, 흔쾌히 앉아서 천천히 구경하고 가라고 말씀해 주셨습니다.\n\n그렇게 그림을 감상하며 자연스럽게 대화를 나누게 되었고, 두 분은 작품을 완성하기 위해 약 3개월 동안 가능하면 매일 오후 4시부터 6시 사이 이곳에 나와 그림을 그리고 있다고 말씀하셨습니다.\n\n또 언제든지 와서 그림을 구경하며 함께 이야기를 나누어도 좋다고 먼저 초대해 주셨습니다.","feeling":"다른 사람의 일에 관심을 나타내어 대화를 시작하니 먼저 초대를 해주셔서 정말 기뻤습니다! 두려워하지말고 대화를 거는 횟수를 늘리면 더 좋은 기회를 만들 수 있을 것 같습니다","keyword":"대화"},{"id":"6월 경험담-68","month":"6월 경험담","num":68,"date":"2026-06-24","cong":"안성남부","name":"서혜미","place":"한경대 맞은편 더리터 카페","situation":"카페에서 음료를 주문하며 아르바이트생과 자연스럽게 대화를 나눔.","response":"카페에 들어가 보니 손님이 많지 않았는데도 아르바이트생이 매장을 꼼꼼하게 청소하고 있었습니다. 그래서 먼저 성실하게 일하는 모습이 보기 좋다고 칭찬했습니다.\n\n음료를 포장이 아닌 매장에서 마시는 것으로 변경한 뒤, 다른 손님이 없는 것을 확인하고 자연스럽게 대화를 시작했습니다.\n\n저희는 길 건너편에서 전시대를 통해 성경을 무료로 소개하는 자원봉사를 하고 있다고 말씀드렸더니, 수고가 많다고 하면서 본인은 천안의 백석대학교에 다니는 기독교 학생이라고 정중하게 자신의 입장을 말씀해 주었습니다.\n\n그래서 일과 학업을 함께 병행하는 것이 쉽지 않을 텐데 정말 부지런한 것 같다고 칭찬해 드렸습니다.\n\n이후 다음에도 전시대 봉사를 하다가 날씨가 너무 더우면 여러 명이 번갈아 음료를 주문하며 잠시 테이블을 이용해도 괜찮은지 여쭤보았습니다.\n\n아르바이트생은 음료만 주문하면 언제든 괜찮다고 흔쾌히 말씀해 주었고, 감사의 인사를 전하며 대화를 마무리했습니다.","feeling":"생각보다 칭찬하며 대화하는것이 사람들의 마음을 열고, 더 깊은 대화까지 할수 있게 하는 좋은 방법임을 알게 되었습니다. 여호와의 증인의 교리에는 관심없지만, 전시대를 보면서 혹은 다른 종교인과는 다른 봉사자들을 보면서 진리에 관심이 가도록 도울 수 있으면 좋겠다고 생각했습니다.","keyword":"대화"},{"id":"6월 경험담-69","month":"6월 경험담","num":69,"date":"2026-06-24","cong":"안성남부","name":"서혜미","place":"내혜홀공원","situation":"공원 벤치에 홀로 앉아 휴대전화를 보고 있던 여성과 자연스럽게 대화를 나눔.","response":"공원 벤치에 혼자 앉아 휴대전화를 보고 계신 분을 보았지만, 바로 말을 걸기보다 짝자매와 함께 옆 벤치에 앉아 일상적인 이야기를 나누었습니다.\n\n일부러 날씨 이야기를 하던 중 상대방께서 휴대전화를 내려놓으신 것을 보고 인사를 드렸더니 밝게 받아 주셨습니다.\n\n대화를 이어가 보니 러시아에서 오신 분이었고, 한국에 오신 지 10년 정도 되어 한국어로 의사소통이 가능하셨습니다.\n\n이야기를 나누면서 조산으로 태어난 아기가 현재 수원의 병원에 입원해 있어 매일 병원을 오가고 계시다는 사정을 알게 되었습니다. 그 수고를 진심으로 위로해 드렸습니다.\n\n이어 짝자매의 도움으로 자녀는 여호와께서 주신 소중한 선물이라는 점을 성경으로 보여 드렸고, 하느님이 정말 계신지 설명하는 러시아어 동영상도 함께 보여 드렸습니다.\n\n그분은 동영상을 진지하게 시청하시며 \"일리가 있는 말인 것 같다.\"고 말씀하셨습니다.\n\n마지막으로 \"하느님이 계신데 왜 세상에는 이렇게 많은 문제가 있는지\"에 대해서는 다음 만남에서 함께 이야기해 보기로 약속했고, 연락처도 서로 교환하였습니다.","feeling":"핸드폰을 보는 사람에게는 일부러 먼저 대화를 처음부터 시작하기보다 시간을 두고 천천히 다가가야 한다는 점을 배우게 되었습니다.","keyword":"대화"},{"id":"6월 경험담-70","month":"6월 경험담","num":70,"date":"2026-06-24","cong":"안성남부","name":"서혜미","place":"내혜홀공원","situation":"공원 벤치에 홀로 앉아 휴대전화를 보고 있던 여성과 자연스럽게 대화를 나눔.","response":"공원 벤치에 혼자 앉아 휴대전화를 보고 계신 분을 보았지만, 바로 말을 걸기보다 짝자매와 함께 옆 벤치에 앉아 일상적인 이야기를 나누었습니다.\n\n일부러 날씨 이야기를 하던 중 상대방께서 휴대전화를 내려놓으신 것을 보고 인사를 드렸더니 밝게 받아 주셨습니다.\n\n대화를 이어가 보니 러시아에서 오신 분이었고, 한국에 오신 지 10년 정도 되어 한국어로 의사소통이 가능하셨습니다.\n\n이야기를 나누면서 조산으로 태어난 아기가 현재 수원의 병원에 입원해 있어 매일 병원을 오가고 계시다는 사정을 알게 되었습니다. 그 수고를 진심으로 위로해 드렸습니다.\n\n이어 짝자매의 도움으로 자녀는 여호와께서 주신 소중한 선물이라는 점을 성경으로 보여 드렸고, 하느님이 정말 계신지 설명하는 러시아어 동영상도 함께 보여 드렸습니다.\n\n그분은 동영상을 진지하게 시청하시며 \"일리가 있는 말인 것 같다.\"고 말씀하셨습니다.\n\n마지막으로 \"하느님이 계신데 왜 세상에는 이렇게 많은 문제가 있는지\"에 대해서는 다음 만남에서 함께 이야기해 보기로 약속했고, 연락처도 서로 교환하였습니다.","feeling":"핸드폰을 보는 사람에게는 일부러 먼저 대화를 처음부터 시작하기보다 시간을 두고 천천히 다가가야 한다는 점을 배우게 되었습니다.","keyword":"대화"},{"id":"6월 경험담-71","month":"6월 경험담","num":71,"date":"2026-06-24","cong":"진사","name":"서민정","place":"내혜홀공원","situation":"벤치에 앉아 휴대전화를 보고 있던 중학생 두 명과 자연스럽게 대화를 나눔.","response":"멀리서 보니 쌍둥이처럼 닮은 중학생 두 명이 벤치에 앉아 휴대전화를 보고 있었습니다.\n\n눈이 마주치자 \"둘이 형제예요?\"라고 물어보았더니 친구라고 대답했습니다.\n\n마침 '좋은 친구란 어떤 친구일까?' 화이트보드 애니메이션으로 연결되는 QR코드가 담긴 JW 카드를 준비하고 있었기에, \"진짜 친구를 사귀는 방법이 궁금해?\"라고 물었습니다.\n\n이어 \"핸드폰으로 그 답을 알려 주는 짧은 애니메이션을 볼 수 있는데, 궁금하면 줄게. 관심이 없으면 안 받아도 괜찮아.\"라고 부담을 주지 않도록 이야기했습니다.\n\n그러자 한 학생이 \"보고 싶어요.\"라고 하여 \"선물이야.\"라고 말하며 JW 카드를 건네주었습니다.","feeling":"다양한 상황의 사람들을 만날 수 있기 때문에 다양한 준비를 해야겠다고 느꼈습니다.","keyword":"대화"},{"id":"6월 경험담-72","month":"6월 경험담","num":72,"date":"2026-06-24","cong":"서운동부","name":"조은경","place":"내혜홀공원","situation":"버스를 기다리던 젊은 여성과 자연스럽게 대화를 나누게 됨.","response":"버스를 기다리고 계신 젊은 여성에게 인사를 건네며 눈 화장이 너무 예쁘고 피부도 좋다고 진심으로 칭찬했습니다.\n\n저는 요즘 유행하는 숙취 메이크업을 따라 해 보았는데 어색한 것 같다고 이야기했더니, 오히려 잘 어울리고 예쁘다고 칭찬해 주셔서 서로 웃으며 편안하게 대화를 시작할 수 있었습니다.\n\n이어 스타일이 세련되고 밝은 인상이 참 좋다고 말씀드렸더니, 본인이 디자이너로 일하고 있어서 그런 것 같다고 하셨습니다. 서로 하는 일에 대해 이야기를 나누었고, 저는 안성에 온 지 2년 반 정도 되었는데 이렇게 스타일이 좋은 젊은 분은 드물게 본 것 같다고 말씀드렸습니다.\n\n먼저 제가 사는 곳을 이야기한 뒤 어디에 사시는지 여쭤보니 가까운 아파트에 거주하고 계신다고 하셨고, 대화 중 먼저 자신의 명함을 건네주셨습니다.\n\n고등학교를 졸업하기도 전에 취업하여 디자이너로 일하게 되었다는 이야기를 듣고, 어린 나이에 사회생활을 시작해 성실하게 자신의 길을 걸어온 모습이 정말 멋지다고 칭찬했습니다. 또 이름 끝 글자가 제 딸과 같다는 공통점도 이야기하며 더욱 친근한 분위기를 만들 수 있었습니다.\n\n저도 제 연락처가 적힌 JW 카드를 건네며 \"마음과 정신이 행복해지는 방법을 QR코드로 알아보세요.\"라고 안내했습니다. 여성분은 카드 디자인을 보며 \"디자인도 멋지고, 글귀도 너무 좋네요.\"라고 좋은 반응을 보였습니다.\n\n마침 버스가 도착할 시간이 되어 저는 바로 옆 전시대에서 자원봉사를 하고 있다고 말씀드렸고, 다음에 다시 만나거나 카카오톡으로 연락드려도 되겠냐고 여쭈었습니다. 여성분은 흔쾌히 좋다고 하며 밝게 인사를 나누고 헤어졌습니다.","feeling":"진심 어리고 밝은 칭찬은 사람의 마음을 여는 좋은 열쇠가 된다는 것을 다시 느꼈습니다. 상대방의\n문신과 같은, 단점이 될만한 것에 대한 선입견을 버리고  장점을 진심으로 인정해 주었을 때 자연스럽고 편안한 분위기에서 대화를 이어 갈 수 있었습니다.","keyword":"대화"},{"id":"6월 경험담-73","month":"6월 경험담","num":73,"date":"2026-06-24","cong":"서운동부","name":"이민정","place":"A 버스정류장","situation":"무거운 짐을 들고 버스를 기다리던 여학생과 자연스럽게 대화를 나눔.","response":"한 여학생이 큰 배낭을 메고 여러 개의 무거운 짐을 들고 버스정류장으로 오는 모습을 보고, 방학이라 집에 가는 길인지, 짐이 정말 무거워 보인다고 말을 건네며 대화를 시작했습니다.\n\n학생은 약 3개월 동안 교환학생으로 해외에 가게 되어 짐을 챙기는 중이라고 이야기해 주었습니다. 그래서 전공과 어느 나라로 가는지 물어보았는데, 마침 제가 예전에 잠시 살았던 나라와 같은 지역이라는 것을 알게 되어 더욱 편안한 분위기에서 이야기를 이어갈 수 있었습니다.\n\n학생이 지금까지 성실하게 학업에 힘써 왔기 때문에 이런 좋은 기회를 얻게 된 것 같다며 칭찬했고, 앞으로도 좋은 경험을 많이 하고 잘될 것이라고 격려해 주었습니다.\n\n그러자 학생은 졸업 후 취업에 대한 고민 등 자신의 속마음을 자연스럽게 이야기해 주었습니다.\n\n마침 버스가 도착할 시간이 되어 길 건너 전시대를 소개하며 JW 카드를 건네주었습니다. 고민이 생길 때 도움이 되는 지혜로운 조언들을 JW.org에서 찾아볼 수 있다고 소개했고, 미국에 가서도 여호와의 증인 전시대를 보게 되면 편하게 대화를 나눠 보라고 권했습니다.","feeling":"상대의 연락처를 받지 못한 아쉬움이 많이 남습니다.","keyword":"대화"},{"id":"6월 경험담-74","month":"6월 경험담","num":74,"date":"2026-06-24","cong":"안성남부","name":"하명수","place":"내혜홀 주차장","situation":"주차 관리 업무를 하고 계신 분께 다가가 자연스럽게 대화를 나눔.","response":"무더운 날씨에도 주차 관리를 위해 수고하시는 모습이 인상적이어서 감사의 말씀을 드리며 대화를 시작했습니다.\n\n이야기를 나누면서 월요일부터 목요일까지 오후 시간에 근무하신다는 것을 알게 되었고, 이마트 뒤편 아파트에 거주하신다는 말씀도 들었습니다. 또 과거에는 제가 살고 있는 아파트 앞 LPG 충전소에서 약 10년 동안 근무하셨다는 이야기를 듣고, 가까운 이웃이었다는 점을 이야기하며 자연스럽게 친근감을 표현했습니다.\n\n대화 중 주차장에 세워져 있던 할아버지의 차량을 보게 되었는데, 20년이 넘은 검은색 투싼임에도 외관이 매우 깨끗하게 관리되어 있었습니다. 그래서 차량을 보며 \"관리하시는 모습만 봐도 평소 자기관리도 철저하신 분인 것 같습니다.\"라고 말씀드렸더니 웃으시며 대화를 이어가셨습니다.\n\n또 LPG 충전소에서 근무하시기 전에는 고속버스 운전기사로 일하셨다는 이야기도 들었습니다. 여러 직업을 성실하게 수행하며 살아오신 점이 정말 대단하다고 말씀드렸고, 대화 내내 자주 미소를 지어 주시는 모습이 참 인상적이라고 말씀드렸습니다.\n\n전체적으로 대화가 매우 자연스럽고 편안하게 이어졌으며, 서로 웃으며 즐거운 시간을 보냈습니다.\n\n헤어지면서 저는 매주 수요일마다 이곳에 봉사를 나오니 앞으로도 자주 찾아뵙고 인사드리겠다고 말씀드렸고, 그분도 밝게 웃으며 인사를 받아주셨습니다.","feeling":"한 번의 대화보다 꾸준한 만남과 진심 어린 관심이 좋은 관계를 만들어 간다는 점을 다시 한번 느꼈습니다.\n\n앞으로도 매주 찾아뵙고 자연스럽게 관계를 이어 가면서, 장차 문앞 성서연구로까지 발전할 수 있도록 여호와께 계속 기도드리며 노력하고 싶다는 결심을 하게 되었습니다.","keyword":"대화"},{"id":"6월 경험담-75","month":"6월 경험담","num":75,"date":"2026-06-24","cong":"안성중앙","name":"이금순","place":"하나로마트 옆 벤치","situation":"벤치에 앉아 있던 중 80대 할머니께서 옆에 앉으시며 먼저 말을 걸어오심.","response":"벤치에 앉아 있는데 80대 정도 되어 보이는 할머니께서 옆에 앉으시며 먼저 \"마트에서 보리차를 파나요?\"라고 말을 걸어오셨습니다.\n\n날씨가 많이 더운데 보리차가 필요하시냐고 여쭈었더니, 물은 가지고 다닌다며 목욕을 다녀오는 길이라고 하셨습니다.\n\n그래서 \"더운 날 목욕하고 오시면 정말 개운하시겠어요.\"라고 말씀드리고, 메고 계신 배낭이 무거워 보이니 잠시 내려놓고 쉬시라고 하며 받아 드렸습니다. 그러자 할머니께서는 고맙다며 요즘에도 이렇게 어른을 챙겨 주는 사람이 있냐고 말씀하셨습니다.\n\n이후 심심해서 밖으로 나왔지만 마땅히 갈 곳이 없다는 이야기를 하셨습니다. 어디에 사시는지 여쭤보니 근처 아파트에서 혼자 지내고 계셨고, 자녀들은 계시지만 외로워서 고향으로 내려가 친구들과 지내고 싶어도 자녀들이 아파트에서 사는 것이 더 편하다며 만류해 그러지 못하고 계신다고 하셨습니다.\n\n고향 친구들이 많이 그리우시겠다고 말씀드리자, 할머니께서는 맞다며 깊은 한숨을 쉬셨습니다.\n\n이후 제 나이를 물으셔서 간단히 이야기한 뒤, 제가 내혜홀 공원에 자주 나오는데 다음에 또 만나 뵐 수 있겠냐고 여쭈었습니다.\n\n할머니께서는 좋다고 하셨고, 저는 수요일 오후 2시쯤 공원에 나오겠다고 말씀드렸습니다. 그러자 할머니께서는 웃으시며 \"기회가 되면 만나요.\"라고 말씀하시고 헤어졌습니다.","feeling":"요즘처럼 사람들 사이의 정이 점점 메말라 가는 세상에서, 외로움 속에 살아가시는 연로한 분들의 삶이 더욱 안타깝게 느껴졌습니다.\n\n이번 만남이 마음에 오래 남았고, 다시 만나 따뜻한 대화를 이어 갈 수 있도록 여호와께 간절히 기도하며 노력해야겠다는 생각이 들었습니다.","keyword":"대화"},{"id":"6월 경험담-76","month":"6월 경험담","num":76,"date":"2026-06-24","cong":"안성북부","name":"양은솔","place":"내혜홀 공원 앞 전시대 중","situation":"태국인 여자분이 전시대에 오셔서 집회 시간을 물어보심.","response":"봉사를 나갈지 고민하던 날, 몸을 일으켜 준비하고 나갔고, 시간이 남아 카페에서 \"좋은 짝이나 좋은 사람을 만나게 해주세요\"라고 기도드렸습니다. 좋은 짝을 만나 첫 타임에 전시대 봉사를 하러 가던 중, 횡단보도 건너 전시대 앞에서 형제들께 무언가 여쭤보시는 듯한 여자분을 만나 인사드렸습니다. 태국분이라고 하셔서, 예전에 태국어 집단에 있었던 경험을 살려 대화를 나눴습니다. 전에 의정부에서 집회에 참석한 적이 있는데 안성에서도 참석할 수 있는지 물으셔서 집회 시간을 알려드리고, 필요하면 함께 회관에 가드리겠다고 하며 연락처를 주고받았습니다.","feeling":"여호와께서 절 사용하심으로 그분의 일에 도움이 되는 사람으로 쓰여 주셔서 감사드립니다. 봉사의 영(=열정)을 계속 유지하는 것이 쉽지 않지만, 그럴 때마다 능력을 주셔서 봉사에 대한 애정을 길러나가게 도와주시는 것 같습니다. 봉사 전 여호와께 기도드리는 것이 얼마나 중요한지 배우게 되었습니다.","keyword":"전시대"},{"id":"6월 경험담-77","month":"6월 경험담","num":77,"date":"2026-06-25","cong":"서운서부","name":"이명숙","place":"내혜홀 공원","situation":"공원에서 삼각김밥을 먹고 있던 베트남 유학생에게 자연스럽게 다가가 대화를 나눔.","response":"공원에서 삼각김밥을 먹고 있던 젊은 여성에게 \"삼각김밥을 자주 드시나 봐요?\"라고 말을 건네며 자연스럽게 대화를 시작했습니다.\n\n이야기를 나누다 보니 베트남에서 온 20살 유학생으로 예술학과에 재학 중이라는 것을 알게 되었습니다. 서로 가족 이야기를 나누며 편안한 분위기에서 대화를 이어 갔고, 이후 카카오톡 친구를 맺어 번역기를 사용하며 조금 더 이야기를 나눌 수 있었습니다.\n\n저희가 한경대 앞에서 전시대를 통해 자원봉사를 하고 있다는 점을 소개한 뒤, 왜 성경을 알아보는 것이 중요한지 설명하는 베트남어 동영상을 함께 보여드렸습니다.\n\n학생은 우체국에 볼일이 있어 먼저 가야 한다고 했고, 다음 주 목요일 오후 4시에 같은 공원에서 다시 만나기로 약속한 뒤 헤어졌습니다.","feeling":"","keyword":"대화"},{"id":"6월 경험담-78","month":"6월 경험담","num":78,"date":"2026-06-25","cong":"안성남부","name":"최종철","place":"한경대 맞은편 버스정류장","situation":"버스를 기다리던 중학생과 자연스럽게 대화를 나눔.","response":"버스를 기다리고 있는 학생에게 몇 번 버스를 기다리는지 물어보며 자연스럽게 대화를 시작했습니다.\n\n학생은 안성의 한 시골 중학교에 다니고 있으며, 시내에 잠시 놀러 왔다가 집으로 돌아가는 길이라고 이야기했습니다.\n\n저는 근처 전시대에서 성경을 무료로 소개하는 자원봉사를 하고 있다고 설명한 뒤, 학교생활과 친구들에 대해 몇 가지 질문을 나누었습니다.\n\n이어 '어떤 친구가 진짜 친구일까?' 동영상을 소개하며 학생에게 공유해 주었고, 다음에도 전시대 앞을 지나게 되면 관심 있는 출판물을 자유롭게 가져가고 궁금한 점이 있으면 언제든 질문해도 된다고 안내했습니다.","feeling":"","keyword":"대화"},{"id":"6월 경험담-79","month":"6월 경험담","num":79,"date":"2026-06-26","cong":"안성남부","name":"유근희 자매","place":"내혜홀 순특공 전시대","situation":"오후 5시 조금 넘어 70대 정도로 보이는 아주머니가 신호등을 기다리고 계셔서, 날이 뜨겁다며 잠깐 앉아서 기다리시라고 말씀드림.","response":"자연스럽게 어디 사시는지 이야기를 나누게 되었는데, 공교롭게도 자신이 어린 시절을 보낸 지역이라 그 지역의 변화와 추억에 대해 친근하게 대화했습니다. 이후 전원생활 이야기로 이어졌고, 아주머니는 도시를 떠나 시골에서 살아보고 싶어 내려왔지만 밭일도 쉽지 않고 건강도 예전 같지 않아 어려움이 많다고 솔직히 말씀하셨습니다. 처음엔 신호등이 바뀔 때까지만 이야기할 줄 알았는데 신호를 한 번 보내고 계속 대화가 이어질 만큼 편안한 분위기였습니다. 전시대 앞이었기에 헤어지기 전 행누 팜플렛을 보여드렸고, 아주머니는 흔쾌히 받아 가시며 읽어보겠다고 하셨습니다. 잡지를 건네자 성경을 잘 아는 사람인가 보다고 하셔서 성경을 공부하고 있다고 말씀드렸고 좋은 반응을 보이셨습니다. 신호등이 바뀌어 아쉬웠지만 우호적인 분위기 속에서 대화를 마쳤습니다.","feeling":"누군가 자신에게 진심 어린 관심을 보여준다면 마음을 열 수 있다는 점을 느꼈습니다. 성경 이야기를 먼저 꺼내지 않고 상대방 이야기에 귀 기울이고 공감해 주었으며, 자연스럽게 좋은 소식을 전할 기회도 갖게 되었습니다. 짧은 만남이었지만 따뜻한 대화와 좋은 자료를 전할 수 있어 기뻤습니다.","keyword":"대화"},{"id":"6월 경험담-80","month":"6월 경험담","num":80,"date":"2026-06-26","cong":"경기 안성 서운 동부","name":"김성진","place":"내혜홀 공원","situation":"5시 30분경, 벤치에 앉아 있는 베트남 남자와의 대화.","response":"벤치에 앉아 있는 남자에게 다가가 말을 걸었더니 베트남 사람이었습니다. 한국에 온 지 5년 가까이 되었고 곧 본국으로 돌아가야 하는 상황이었습니다. 휴지 공장에서 주 6일 근무하며 성실하게 일하는 점을 칭찬해주고 베트남어로 된 영상 2개를 보여주었습니다. \"왕국회관은 어떤 곳입니까?\" 동영상에 관심을 보였고 그곳에 가면 베트남 친구들을 만날 수 있는지 물었습니다. 베트남 사람은 없지만 좋은 친구들을 사귈 수 있을 것이라 말하며 주말 집회에 초대했습니다.","feeling":"외국어로 된 영상을 미리 다운로드해 놓는 것과 베트남어로 간단한 자기소개를 연습해보면 좋겠다는 생각을 했습니다.","keyword":"비공식 증거(외국인)"},{"id":"6월 경험담-81","month":"6월 경험담","num":81,"date":"2026-06-26","cong":"경기 안성 서운 동부","name":"김현준","place":"복합 문화관 근처","situation":"한경대학교 외부 청소 직원을 재방문하기 위해 직원 휴게실을 방문했으나 해당 직원은 자리에 없었고, 대신 다른 청소 직원과 대화할 기회가 있었음.","response":"그분은 평소 얼굴을 알고 계셔서 짝 자매와 함께 자연스럽게 대화를 이어갈 수 있었습니다. 그분이 짝 자매와 같은 고향 출신이라는 것을 알게 되었고, 어머니의 건강 때문에 안성으로 오게 되었다는 이야기도 들었습니다. 전반적으로 분위기가 매우 우호적이었으며 좋은 인상을 남긴 채 대화를 마무리했습니다.","feeling":"평소 우리의 밝은 미소와 인사가 다른 사람들에게 좋은 인상을 남길 수 있다는 점을 알게 되었습니다.","keyword":"대화"},{"id":"6월 경험담-82","month":"6월 경험담","num":82,"date":"2026-06-27","cong":"안성남부","name":"지영주","place":"내혜홀전시대장","situation":"벤치에 앉은 대학생. 친척이 증인이지만 성서 진리가 잘 와닿지 않아함.","response":"jw카드를 전달하면서 인생의 의문점(결혼, 경제, 죽음, 삶의 방향, 좋은 친구 등)에 대해 검색할 수 있고 인간 역사를 통찰하여 조언을 얻을 수 있다고 하니 관심을 보이며 카드를 받았고, 매주 학교에 나오니 만나서 더 이야기 나누기로 했습니다.","feeling":"성서로 인도하기 위한 조직의 다양한 마련에 감사합니다.","keyword":"대화"},{"id":"6월 경험담-83","month":"6월 경험담","num":83,"date":"2026-06-27","cong":"안성 서운서부","name":"이경자","place":"공원(정자)","situation":"공원 정자에 앉으려는데 한 부부가 안성시장에서 장보고 잠시 쉬려고 오심.","response":"장보고 오셨냐고 이것저것 질문하며 많은 대화를 나눴습니다. 두 분이 함께 장보고 오신 모습이 보기 좋다고 하니 좋아하셨습니다. 안성 토박이셨고 남편분은 69세 정도로 생산직 일을 하셨습니다. 아들 부부와 근처에 살아 매일 오후 손녀손자를 봐주시며 긍정적으로 지내신다고 하셨습니다. 이 공원에 자주 나오신다고 하셨고, 두 분 다 키가 크셨습니다.","feeling":"다음에 이 공원에 다시 오시면 또 뵙자고 인사하고 헤어졌습니다. 누구에게나 친절하고 따뜻하게 관심을 나타내다 보면 언젠가는 그들도 진리로 들어오게 할 수 있을 것이라는 확신이 듭니다.","keyword":"대화"},{"id":"6월 경험담-84","month":"6월 경험담","num":84,"date":"2026-06-29","cong":"안성 서운 동부","name":"유광만","place":"내혜홀 공원","situation":"공원 벤치에서 쉬고 있는 70대 중반 아저씨와 자연스러운 대화.","response":"대화 후 거주지를 알려주셨습니다. 연락처와 jw.org 카드를 드리고 성서 연구 방법을 소개해 드렸습니다. 사모님과 사별하신 분께 계시록 21:4를 보여드리고 격려해 드렸습니다. 추후 편안할 때 연락 주시라고 했습니다.","feeling":"-","keyword":"대화"},{"id":"6월 경험담-85","month":"6월 경험담","num":85,"date":"2026-06-29","cong":"안성 북부","name":"김현옥","place":"한경대 캠퍼스","situation":"벤치에 앉아 계신 여자분.","response":"같은 벤치에 앉지 않고 옆 벤치에 앉으며 \"날씨가 너무 덥네요\"라고 말하니 웃으시며 \"여기 근처에 사냐\"고 물으셨습니다. 사는 동네를 알려드리고 \"전시대 하러 왔다\"고 하니 \"여호와의 증인이냐\"고 물으셨습니다. 이어 \"왜 증인들은 나라법을 안 지키냐\", \"어떻게 사람이 영원히 사냐\", \"그럼 사람이 죽으면 어떻게 되냐\", \"그럼 다윗은 지금 어디에 있냐\"는 질문을 하셨습니다. 이 질문들에 간단히 답해드리고 다음에 만나기로 하고 전화번호를 주고받았습니다. 본인은 진리를 찾으려고 여러 종교를 가보셨다고 하셨습니다.","feeling":"논쟁하려고 하지 않으셨고 이야기를 차분히 들으셨습니다. 각자의 신앙은 존중해줘야 한다는 말에 동의하셨고, 자기가 믿는 기독교에 대해서도 이야기를 들어보라고 하셨습니다. 성품이 차분하고 착한 분으로 보였습니다.","keyword":"대화"},{"id":"7월 경험담-1","month":"7월 경험담","num":1,"date":"2026-07-01","cong":"서운동부","name":"김지수","place":"전시대","situation":"전시대 앞에서 대화. 전타임 팀과 교체 중 계속 전시대를 바라보던 30대 남자와 대화할 기회가 있었음.","response":"전타임 김정자 자매가 읽어볼 수 있다며 제안했지만 거절했습니다. 이후에도 계속 전시대를 응시하고 있어 먼저 다가가 행누 팜플렛의 \"영원히 행복할 수 있는가?\" 질문을 생각해본 적 있느냐고 물었습니다. 남자의 답은 \"가능하다\"였습니다. 남자는 교회를 다니다 중단한 상태로 보였고 성경에 깊은 관심을 갖고 있었습니다. 처음엔 방어적인 태도였으나 대화 중 계속된 칭찬을 통해 더 성경적인 대화를 많이 나누게 되었습니다. 이사야 42:10을 시작으로 마태복음 11:29, 요한1서 2:19, 이사야 43:10에 대해 좋은 대화를 나눴습니다. 정기적으로 5~10분 성경 이야기를 나눌 것을 제안했으나 거절했습니다. 연락처 교환도 제안했으나 경계하며 거절했습니다. 다만 해당 요일, 시간에 이곳에서 만날 수 있다는 사실을 알려주고 다시 만날 가능성을 열어두고 헤어졌습니다.","feeling":"부드러운 이해심과 칭찬은 경계 섞인 마음도 누그러뜨릴 수 있다는 것을 느꼈습니다.","keyword":"전시대 봉사"},{"id":"7월 경험담-2","month":"7월 경험담","num":2,"date":"2026-07-01","cong":"서운서부회중","name":"김정자","place":"신호등 앞","situation":"9시 전시대 이후에 비공식 증거.","response":"주차장에서 나와 신호를 기다리던 중 지나가는 외국인 여자를 보고 스리랑카 사람인 것 같아 인사하며 어느 나라 사람인지 물으니 스리랑카 사람이라 하여 신할리즈어로 인사하고 어디 가는지 물었습니다. 한국 사람이 싱할라어를 하니 반가워하여 차를 주차장 쪽으로 빼서 파킹하니 우리 쪽으로 건너오면서 어떻게 싱할라를 아는지, 어떻게 배웠는지 물었고, 자신은 한국어를 배우러 학교에 간다고 하며 잠깐 여러 대화를 나누고 서로 전화번호를 주고받았습니다. 뒤에 오는 친구에게도 싱할라 말을 할 줄 안다고 소개해 주었고 그 친구 번호도 주고받으며 반가워했습니다.","feeling":"다음에 만나자는 약속을 하고 헤어지며 이 친구들이 좋은 소식에 관심을 갖기 바라는 마음이었습니다. 만날 수 있는 시간에 그 자리에 있어서 행복했습니다.","keyword":"비공식 증거(외국인)"},{"id":"7월 경험담-3","month":"7월 경험담","num":3,"date":"2026-07-01","cong":"서운 서부","name":"김정자","place":"전시대 앞","situation":"남성 60대 이상. 신호를 기다리며 서 있던 아저씨께서 계속 전시대를 쳐다보셔서 이런 내용에 대해 생각해보신 적 있으신지 여쭤보며 행누 팜플렛 뒷면을 보여드림.","response":"이 종교가 영국에서 왔느냐고 물으셔서 여호와의 증인의 본부는 미국에 있다고 답하니, 이 종교가 50년 정도 되었냐고 하셔서 한국에 들어온 지도 100년이 넘었다고 말씀드렸습니다. 신호가 바뀌며 가셨지만 잠깐이라도 증인들에 대해 말해줄 수 있어서 좋았고, 물어봐 주신 아저씨가 고마웠습니다.","feeling":"무관심 속에서도 작은 질문이라도 던져주신 아저씨가 고맙게 느껴집니다.","keyword":"전시대"},{"id":"7월 경험담-4","month":"7월 경험담","num":4,"date":"2026-07-01","cong":"안성 남부","name":"최보람","place":"교내·학교","situation":"여성 60대 이상, 여성 30~50대, 재방문.","response":"소지품으로 대화를 시작했습니다. 편의점에서 사간 음료수를 건네며, 저번 주에 초대해서 보고 가라고 하신 그림이 어떻게 완성됐는지 궁금해서 이번 주에 다시 보고 싶어서 왔다고 말했습니다. 다른 사람들은 전시회장에서 티켓을 사고 보는데 자신은 실시간으로 보게 해주셔서 감사해서 음료수를 사왔다고 하며 대화를 이어갔습니다. 무슨 일로 이곳에 왔는지, 이 시간마다 올 수 있는 이유(수요일 4~6시 전시대 자원봉사)를 말씀드렸습니다.","feeling":"부담을 내려놓고 편안하게 대화하니 시간 가는 줄 모르고 즐겁게 대화를 나누게 되었습니다. 다음엔 순특공 봉사뿐 아니라 다른 시간에도 방문해야겠다고 생각했습니다.","keyword":"재방문"},{"id":"7월 경험담-5","month":"7월 경험담","num":5,"date":"2026-07-01","cong":"안성 남부","name":"서혜미","place":"공원·광장","situation":"여성 25세 일본인 유학생. 소녀상을 유심히 지켜보는 모습을 보고, 이 공원에서 소녀상에 이렇게 관심 가진 사람은 처음 본다며 어린 나이에 사회 문제에 관심을 가   let s = raw.replace(/\(.*?\)/g, "").replace(/형제|자매/g, "").replace(/\s+/g, " ").trim();
  return s || "미기재";
}
function normCong(raw) {
  if (!raw || raw === "-" || !raw.trim()) return "회중 미기재";
  let s = raw.replace(/회중/g, "").replace(/경기/g, "").replace(/\s+/g, "").trim();
  if (s.includes(",")) s = s.split(",")[0];
  const map = [
    ["안성서운동부", "서운동부"], ["안성서운서부", "서운서부"],
    ["안성남부", "안성남부"], ["안성북부", "안성북부"], ["안성중앙", "안성중앙"],
    ["안성정봉", "안성정봉"], ["안성승두", "안성승두"],
    ["서운동부", "서운동부"], ["서운서부", "서운서부"], ["진사", "진사"],
  ];
  for (const [pat, canon] of map) if (s === pat || s.startsWith(pat)) return canon;
  return s || "회중 미기재";
}

async function apiLoad() {
  if (!API_URL) {
    try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}"); }
    catch { return {}; }
  }
  const res = await fetch(API_URL + "?action=load", { method: "GET" });
  if (!res.ok) throw new Error("load failed");
  return await res.json();
}
async function apiSave(id, entry) {
  if (!API_URL) {
    const cur = JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}");
    cur[id] = entry;
    localStorage.setItem(LOCAL_KEY, JSON.stringify(cur));
    return true;
  }
  // Apps Script는 CORS 프리플라이트를 피하기 위해 text/plain 사용
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "save", id, entry }),
  });
  return res.ok;
}

function App() {
  const [tab, setTab] = useState("people");
  const [groupBy, setGroupBy] = useState("person");
  const [sortBy, setSortBy] = useState("count");
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [selectedCong, setSelectedCong] = useState(null);
  const [monthFilter, setMonthFilter] = useState("전체");
  const [search, setSearch] = useState("");
  const [trackedOnly, setTrackedOnly] = useState(false);
  const [tracking, setTracking] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState(false);
  const [saveState, setSaveState] = useState("idle");
  const [expanded, setExpanded] = useState({});

  useEffect(() => {
    apiLoad()
      .then((t) => { setTracking(t || {}); setLoaded(true); })
      .catch(() => { setLoadError(true); setLoaded(true); });
  }, []);

  const updateEntry = useCallback((id, patch) => {
    setTracking((prev) => {
      const cur = prev[id] || {};
      const entry = { ...cur, ...patch, updatedAt: new Date().toISOString().slice(0, 10) };
      const next = { ...prev, [id]: entry };
      setSaveState("saving");
      apiSave(id, entry)
        .then((ok) => setSaveState(ok ? "idle" : "error"))
        .catch(() => setSaveState("error"));
      return next;
    });
  }, []);

  const isTracked = (id) => {
    const st = tracking[id]?.status;
    return st && st !== "none";
  };

  const people = useMemo(() => {
    const map = {};
    DATA.forEach((r) => {
      const n = normName(r.name);
      if (!map[n]) map[n] = { key: n, name: n, congs: new Set(), records: [] };
      map[n].records.push(r);
      const c = normCong(r.cong);
      if (c !== "회중 미기재") map[n].congs.add(c);
    });
    return Object.values(map);
  }, []);

  const congs = useMemo(() => {
    const map = {};
    DATA.forEach((r) => {
      const c = normCong(r.cong);
      if (!map[c]) map[c] = { key: c, name: c, names: new Set(), records: [] };
      map[c].records.push(r);
      map[c].names.add(normName(r.name));
    });
    return Object.values(map);
  }, []);

  const sortGroups = (groups) => {
    const arr = [...groups];
    if (sortBy === "name") arr.sort((a, b) => a.name.localeCompare(b.name, "ko"));
    else arr.sort((a, b) => b.records.length - a.records.length || a.name.localeCompare(b.name, "ko"));
    return arr;
  };

  const filteredRecords = useMemo(() => {
    let recs = DATA;
    if (selectedPerson) recs = recs.filter((r) => normName(r.name) === selectedPerson);
    if (selectedCong) recs = recs.filter((r) => normCong(r.cong) === selectedCong);
    if (monthFilter !== "전체") recs = recs.filter((r) => r.month === monthFilter);
    if (trackedOnly) recs = recs.filter((r) => { const s = tracking[r.id]?.status; return s && s !== "none"; });
    if (search.trim()) {
      const q = search.trim();
      recs = recs.filter((r) =>
        r.name.includes(q) || r.place.includes(q) || r.situation.includes(q) ||
        r.response.includes(q) || r.keyword.includes(q) || r.cong.includes(q));
    }
    return [...recs].sort((a, b) => (a.date < b.date ? 1 : -1));
  }, [selectedPerson, selectedCong, monthFilter, search, trackedOnly, tracking]);

  const trackedRecords = useMemo(
    () => DATA.filter((r) => tracking[r.id]?.status && tracking[r.id].status !== "none"),
    [tracking]
  );

  const stats = useMemo(() => {
    const by = {};
    STATUSES.forEach((s) => (by[s.key] = 0));
    trackedRecords.forEach((r) => { const k = tracking[r.id]?.status || "none"; by[k] = (by[k] || 0) + 1; });
    return by;
  }, [trackedRecords, tracking]);

  if (!loaded)
    return <div style={ui.page}><div style={{ padding: 60, textAlign: "center", color: "#6B7280" }}>자료를 불러오는 중…</div></div>;

  return (
    <div style={ui.page}>
      <header style={ui.header}>
        <div>
          <div style={ui.eyebrow}>순회구 특별 공개 증거</div>
          <h1 style={ui.title}>경험담 관리 대장</h1>
        </div>
        <div style={ui.headerMeta}>
          <span>총 {DATA.length}건</span>
          <span style={ui.dot}>·</span>
          <span>관리 중 {trackedRecords.length}건</span>
          {saveState === "saving" && <span style={{ color: "#B45309" }}> · 저장 중…</span>}
          {saveState === "error" && <span style={{ color: "#DC2626" }}> · 저장 실패</span>}
          {!API_URL && <span style={{ color: "#9CA3AF" }}> · 이 기기 저장</span>}
        </div>
      </header>

      {loadError && (
        <div style={ui.warnBar}>
          저장된 진행 상태를 불러오지 못했습니다. 인터넷 연결 또는 구글시트 설정을 확인해 주세요.
        </div>
      )}

      <nav style={ui.tabs}>
        {[["people", "분류별 보기"], ["all", "전체 경험담"], ["board", "관리 현황판"]].map(([k, label]) => (
          <button key={k}
            onClick={() => { setTab(k); if (k !== "people") { setSelectedPerson(null); setSelectedCong(null); } }}
            style={{ ...ui.tabBtn, ...(tab === k ? ui.tabBtnActive : {}) }}>
            {label}
            {k === "board" && trackedRecords.length > 0 && <span style={ui.tabBadge}>{trackedRecords.length}</span>}
          </button>
        ))}
      </nav>

      {tab === "people" && !selectedPerson && !selectedCong && (
        <div>
          <div style={ui.controlRow}>
            <div style={ui.groupToggle}>
              <button onClick={() => setGroupBy("person")} style={{ ...ui.groupBtn, ...(groupBy === "person" ? ui.groupBtnActive : {}) }}>전도인별</button>
              <button onClick={() => setGroupBy("cong")} style={{ ...ui.groupBtn, ...(groupBy === "cong" ? ui.groupBtnActive : {}) }}>회중별</button>
            </div>
            <div style={ui.groupToggle}>
              <button onClick={() => setSortBy("count")} style={{ ...ui.groupBtn, ...(sortBy === "count" ? ui.groupBtnActive : {}) }}>경험담 많은 순</button>
              <button onClick={() => setSortBy("name")} style={{ ...ui.groupBtn, ...(sortBy === "name" ? ui.groupBtnActive : {}) }}>가나다순</button>
            </div>
          </div>
          <input style={ui.search} placeholder={groupBy === "person" ? "전도인 이름 검색…" : "회중 이름 검색…"} value={search} onChange={(e) => setSearch(e.target.value)} />
          <div style={ui.peopleGrid}>
            {sortGroups(groupBy === "person" ? people : congs)
              .filter((g) => !search.trim() || g.name.includes(search.trim()))
              .map((g) => {
                const tc = g.records.filter((r) => tracking[r.id]?.status && tracking[r.id].status !== "none").length;
                const sub = groupBy === "person" ? [...g.congs].slice(0, 2).join(", ") : `전도인 ${g.names.size}명`;
                return (
                  <button key={g.key} style={ui.personCard}
                    onClick={() => { if (groupBy === "person") setSelectedPerson(g.key); else setSelectedCong(g.key); setSearch(""); }}>
                    <div style={ui.personName}>{g.name}</div>
                    <div style={ui.personMeta}>경험담 {g.records.length}건{tc > 0 && <span style={{ color: "#B45309" }}> · 관리 {tc}</span>}</div>
                    <div style={ui.personCong}>{sub}</div>
                  </button>
                );
              })}
          </div>
        </div>
      )}

      {((tab === "people" && (selectedPerson || selectedCong)) || tab === "all") && (
        <div>
          {(selectedPerson || selectedCong) && (
            <div style={ui.personHeader}>
              <button style={ui.backBtn} onClick={() => { setSelectedPerson(null); setSelectedCong(null); }}>← {groupBy === "person" ? "전도인" : "회중"} 목록</button>
              <h2 style={ui.personTitle}>{selectedPerson || selectedCong}</h2>
            </div>
          )}
          <div style={ui.filterRow}>
            <select style={ui.select} value={monthFilter} onChange={(e) => setMonthFilter(e.target.value)}>
              <option value="전체">전체 기간</option>
              {MONTH_ORDER.map((m) => <option key={m} value={m}>{monthShort(m)}</option>)}
            </select>
            <input style={{ ...ui.search, marginBottom: 0, flex: 1, minWidth: 140 }} placeholder="장소·내용·키워드…" value={search} onChange={(e) => setSearch(e.target.value)} />
            <label style={ui.checkLabel}><input type="checkbox" checked={trackedOnly} onChange={(e) => setTrackedOnly(e.target.checked)} />관리 중만</label>
          </div>
          <div style={ui.countLine}>{filteredRecords.length}건</div>
          {filteredRecords.map((r) => (
            <RecordCard key={r.id} r={r} t={tracking[r.id]} expanded={!!expanded[r.id]}
              onToggleExpand={() => setExpanded((e) => ({ ...e, [r.id]: !e[r.id] }))}
              onStatus={(s) => updateEntry(r.id, { status: s })}
              onMemo={(m) => updateEntry(r.id, { memo: m })} />
          ))}
          {filteredRecords.length === 0 && <div style={ui.empty}>조건에 맞는 경험담이 없습니다.</div>}
        </div>
      )}

      {tab === "board" && (
        <div>
          <div style={ui.statRow}>
            {STATUSES.filter((s) => s.key !== "none").map((s) => (
              <div key={s.key} style={{ ...ui.statCard, borderTop: `3px solid ${s.color}` }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: s.color }}>{stats[s.key] || 0}</div>
                <div style={{ fontSize: 12, color: "#6B7280" }}>{s.label}</div>
              </div>
            ))}
          </div>
          {trackedRecords.length === 0 && (
            <div style={ui.empty}>아직 진행 상태를 지정한 경험담이 없습니다.<br />경험담 목록에서 재방문·성서연구로 이어질 가능성이 있는 건의 진행 상태를 눌러 지정하면 여기에 자동으로 모입니다.</div>
          )}
          {STATUSES.filter((s) => s.key !== "none").map((s) => {
            const recs = trackedRecords.filter((r) => (tracking[r.id]?.status || "none") === s.key);
            if (recs.length === 0) return null;
            return (
              <div key={s.key} style={{ marginBottom: 28 }}>
                <h3 style={{ ...ui.boardHeading, color: s.color }}>{s.label} <span style={{ color: "#9CA3AF", fontWeight: 400 }}>{recs.length}건</span></h3>
                {recs.map((r) => (
                  <RecordCard key={r.id} r={r} t={tracking[r.id]} expanded={!!expanded[r.id]}
                    onToggleExpand={() => setExpanded((e) => ({ ...e, [r.id]: !e[r.id] }))}
                    onStatus={(st) => updateEntry(r.id, { status: st })}
                    onMemo={(m) => updateEntry(r.id, { memo: m })} />
                ))}
              </div>
            );
          })}
        </div>
      )}

      <footer style={ui.footer}>
        {API_URL ? "진행 상태·메모는 구글시트에 저장되어 위원회가 함께 봅니다." : "진행 상태·메모가 이 기기에만 저장됩니다. 공유하려면 구글시트 연동을 설정하세요."}
        <br />
        <span style={{ color: "#C0392B" }}>개인정보가 포함되어 있습니다. 링크·파일은 위원회 안에서만 공유해 주세요.</span>
      </footer>
    </div>
  );
}

function RecordCard({ r, t, expanded, onToggleExpand, onStatus, onMemo }) {
  const tracked = t?.status && t.status !== "none";
  const status = statusOf(t?.status);
  const [memoDraft, setMemoDraft] = useState(t?.memo || "");
  useEffect(() => setMemoDraft(t?.memo || ""), [t?.memo]);

  return (
    <div style={{ ...ui.card, ...(tracked ? ui.cardFlagged : {}) }}>
      <div style={ui.cardTop}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={ui.cardMeta}>{r.date} · {monthShort(r.month)} #{r.num} · {normCong(r.cong)}</div>
          <div style={ui.cardName}>{normName(r.name)}<span style={ui.cardPlace}> — {r.place}</span></div>
          {r.keyword && <span style={ui.keywordChip}>{r.keyword}</span>}
          {tracked && <span style={{ ...ui.statusChip, color: status.color, background: status.bg }}>{status.label}</span>}
        </div>
      </div>
      <div style={ui.cardBody}>
        <p style={ui.situText}>{r.situation || "(상황 미기재)"}</p>
        {expanded && (
          <div>
            {r.response && <div style={ui.section}><div style={ui.sectionLabel}>응대</div><p style={ui.bodyText}>{r.response}</p></div>}
            {r.feeling && r.feeling !== "-" && <div style={ui.section}><div style={ui.sectionLabel}>느낀점</div><p style={ui.bodyText}>{r.feeling}</p></div>}
          </div>
        )}
        <button style={ui.expandBtn} onClick={onToggleExpand}>{expanded ? "접기 ▲" : "자세히 보기 ▼"}</button>
      </div>
      <div style={ui.trackBox}>
        <div style={ui.trackRow}>
          <span style={ui.trackLabel}>진행 상태</span>
          <div style={ui.statusBtns}>
            {STATUSES.map((s) => (
              <button key={s.key} onClick={() => onStatus(s.key)}
                style={{ ...ui.statusBtn, ...(t?.status === s.key || (!t?.status && s.key === "none") ? { background: s.bg, color: s.color, borderColor: s.color, fontWeight: 700 } : {}) }}>
                {s.label}
              </button>
            ))}
          </div>
        </div>
        {tracked && (
          <div style={ui.trackRow}>
            <span style={ui.trackLabel}>메모</span>
            <input style={ui.memoInput} placeholder="예: 7/10 재방 약속, 연락처 있음" value={memoDraft}
              onChange={(e) => setMemoDraft(e.target.value)}
              onBlur={() => { if (memoDraft !== (t?.memo || "")) onMemo(memoDraft); }} />
          </div>
        )}
        {tracked && t?.updatedAt && <div style={ui.updatedAt}>마지막 수정: {t.updatedAt}</div>}
      </div>
    </div>
  );
}

const ui = {
  page: { maxWidth: 720, margin: "0 auto", padding: "18px 14px 60px", minHeight: "100vh" },
  header: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 8, marginBottom: 16, paddingBottom: 12, borderBottom: "2px solid #1E5F4E" },
  eyebrow: { fontSize: 11, letterSpacing: 1.5, color: "#1E5F4E", fontWeight: 600 },
  title: { fontSize: 22, fontWeight: 800, margin: "2px 0 0", color: "#14332B" },
  headerMeta: { fontSize: 12.5, color: "#6B7280" },
  dot: { margin: "0 4px" },
  warnBar: { background: "#FEF2F2", color: "#B91C1C", border: "1px solid #FCA5A5", borderRadius: 8, padding: "10px 12px", fontSize: 13, marginBottom: 14, lineHeight: 1.5 },
  tabs: { display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" },
  tabBtn: { padding: "10px 16px", borderRadius: 20, border: "1px solid #D1D5DB", background: "#fff", fontSize: 14, cursor: "pointer", color: "#374151", flex: "1 1 auto", minWidth: 96 },
  tabBtnActive: { background: "#1E5F4E", color: "#fff", borderColor: "#1E5F4E", fontWeight: 600 },
  tabBadge: { marginLeft: 6, fontSize: 11, background: "#B7791F", color: "#fff", borderRadius: 10, padding: "1px 7px" },
  controlRow: { display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" },
  groupToggle: { display: "inline-flex", background: "#EDEBE4", borderRadius: 10, padding: 3, marginBottom: 12, gap: 2 },
  groupBtn: { padding: "9px 14px", borderRadius: 8, border: "none", background: "transparent", fontSize: 13, cursor: "pointer", color: "#6B7280", fontWeight: 500, whiteSpace: "nowrap" },
  groupBtnActive: { background: "#fff", color: "#14332B", fontWeight: 700, boxShadow: "0 1px 2px #0000000f" },
  search: { width: "100%", padding: "12px 14px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 16, marginBottom: 14, background: "#fff" },
  peopleGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 10 },
  personCard: { textAlign: "left", padding: "14px", borderRadius: 12, border: "1px solid #E5E7EB", background: "#fff", cursor: "pointer" },
  personName: { fontWeight: 700, fontSize: 15, marginBottom: 3 },
  personMeta: { fontSize: 12.5, color: "#6B7280" },
  personCong: { fontSize: 11.5, color: "#9CA3AF", marginTop: 4, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" },
  personHeader: { display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" },
  backBtn: { border: "none", background: "none", color: "#1E5F4E", fontSize: 14, cursor: "pointer", padding: "4px 0" },
  personTitle: { fontSize: 20, fontWeight: 800, margin: 0 },
  filterRow: { display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 8 },
  select: { padding: "11px 10px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 15, background: "#fff" },
  checkLabel: { fontSize: 13.5, color: "#374151", display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap" },
  countLine: { fontSize: 12.5, color: "#9CA3AF", margin: "4px 0 10px" },
  card: { background: "#fff", border: "1px solid #E5E7EB", borderRadius: 12, padding: "14px 15px", marginBottom: 12 },
  cardFlagged: { borderColor: "#B7791F", boxShadow: "0 0 0 1px #B7791F22" },
  cardTop: { display: "flex", gap: 10, alignItems: "flex-start" },
  cardMeta: { fontSize: 12, color: "#9CA3AF", marginBottom: 2 },
  cardName: { fontSize: 15.5, fontWeight: 700 },
  cardPlace: { fontWeight: 400, color: "#4B5563", fontSize: 14 },
  keywordChip: { display: "inline-block", fontSize: 11.5, background: "#E8F0EC", color: "#1E5F4E", borderRadius: 6, padding: "2px 8px", marginTop: 6, marginRight: 6 },
  statusChip: { display: "inline-block", fontSize: 11.5, borderRadius: 6, padding: "2px 8px", marginTop: 6, fontWeight: 600 },
  cardBody: { marginTop: 8 },
  situText: { fontSize: 14.5, color: "#374151", margin: "0 0 6px", lineHeight: 1.6 },

  trackBox: { marginTop: 12, paddingTop: 12, borderTop: "1px dashed #E5C98F" },
  trackRow: { display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 8, flexWrap: "wrap" },
  trackLabel: { fontSize: 12.5, fontWeight: 700, color: "#92400E", width: 56, paddingTop: 8 },
  statusBtns: { display: "flex", gap: 6, flexWrap: "wrap", flex: 1 },
  statusBtn: { fontSize: 12.5, padding: "8px 12px", borderRadius: 16, border: "1px solid #E5E7EB", background: "#fff", color: "#6B7280", cursor: "pointer" },

  updatedAt: { fontSize: 11, color: "#B4B4B4", textAlign: "right", width: "100%" },
  statRow: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(96px,1fr))", gap: 10, marginBottom: 24 },
  statCard: { background: "#fff", border: "1px solid #E5E7EB", borderRadius: 10, padding: "12px 8px", textAlign: "center" },
  boardHeading: { fontSize: 16, fontWeight: 800, margin: "0 0 10px" },
  empty: { padding: "40px 20px", textAlign: "center", color: "#9CA3AF", fontSize: 14, lineHeight: 1.8, background: "#fff", border: "1px dashed #E5E7EB", borderRadius: 12 },
  footer: { marginTop: 40, fontSize: 12, color: "#9CA3AF", textAlign: "center", lineHeight: 1.7 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
