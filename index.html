<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1E5F4E" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

<title>순특공 경험담 관리 대장</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: #FAFAF8; }
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,-apple-system,sans-serif; color: #1F2937; -webkit-text-size-adjust: 100%; }
#root { min-height: 100vh; }
input, select, button, textarea { font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: 2px solid #1E5F4E; outline-offset: 1px; }

/* 잠금 화면 */
#lock-screen {
  position: fixed; inset: 0; background: #FAFAF8;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px; z-index: 999;
}
.lock-logo { font-size: 40px; margin-bottom: 16px; }
.lock-title { font-size: 20px; font-weight: 800; color: #14332B; margin-bottom: 4px; }
.lock-sub { font-size: 13px; color: #6B7280; margin-bottom: 32px; text-align: center; line-height: 1.6; }
.lock-box { width: 100%; max-width: 320px; }
.lock-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
.lock-input {
  width: 100%; padding: 14px 16px; font-size: 17px; border-radius: 10px;
  border: 1.5px solid #D1D5DB; background: #fff; margin-bottom: 12px;
  letter-spacing: 2px;
}
.lock-input:focus { outline: none; border-color: #1E5F4E; }
.lock-btn {
  width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
  border-radius: 10px; border: none; background: #1E5F4E; color: #fff;
  cursor: pointer; margin-bottom: 12px;
}
.lock-btn:active { background: #14332B; }
.lock-btn:disabled { background: #9CA3AF; cursor: not-allowed; }
.lock-err { color: #DC2626; font-size: 13px; text-align: center; min-height: 20px; }
.lock-hint { font-size: 12px; color: #9CA3AF; text-align: center; margin-top: 20px; line-height: 1.6; }
.lock-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock-screen">
  <div class="lock-logo">🔐</div>
  <div class="lock-title">순특공 경험담 관리 대장</div>
  <div class="lock-sub">위원회 전용 앱입니다.<br />접근하려면 암호를 입력하세요.</div>
  <div class="lock-box">
    <label class="lock-label" for="pw-input">암호</label>
    <input id="pw-input" class="lock-input" type="password" placeholder="암호 입력" autocomplete="current-password" />
    <button id="unlock-btn" class="lock-btn" onclick="tryUnlock()">열기</button>
    <div id="lock-err" class="lock-err"></div>
    <div class="lock-hint">
    </div>
  </div>
</div>

<!-- 앱 (잠금 해제 후 렌더링) -->
<div id="root" style="display:none"></div>

<script>
// ── AES-256-GCM 복호화 (Web Crypto API) ─────────────────────
const SALT = new TextEncoder().encode("sunteukgong-ministry-2026");
const PBKDF2_ITER = 310000;

async function deriveKey(password) {
  const raw = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: SALT, iterations: PBKDF2_ITER, hash: "SHA-256" },
    raw,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
}

async function decryptData(password, b64) {
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const nonce = buf.slice(0, 12);
  const ct    = buf.slice(12);
  const key   = await deriveKey(password);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
  return JSON.parse(new TextDecoder().decrypt ? new TextDecoder().decrypt(plain) : new TextDecoder().decode(plain));
}

let DATA = null;
const REMEMBER_KEY = "sunteuk-pw"; // sessionStorage: 이 탭을 닫으면 자동 삭제됨

async function unlockWithPassword(pw) {
  const b64 = document.getElementById("enc-data").textContent.trim();
  DATA = await decryptData(pw, b64);
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("root").style.display = "";
  renderApp();
}

async function tryUnlock() {
  const pw  = document.getElementById("pw-input").value;
  const btn = document.getElementById("unlock-btn");
  const err = document.getElementById("lock-err");
  if (!pw) { err.textContent = "암호를 입력해 주세요."; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="lock-spinner"></span>확인 중…';
  err.textContent = "";
  try {
    await unlockWithPassword(pw);
    // 이 탭을 닫을 때까지만 기억 (새로고침해도 다시 안 물어봄)
    sessionStorage.setItem(REMEMBER_KEY, pw);
  } catch(e) {
    err.textContent = "암호가 맞지 않습니다. 다시 입력해 주세요.";
    btn.disabled = false;
    btn.textContent = "열기";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

// Enter 키로 열기 + 같은 탭 새로고침 시 자동 재입장
document.addEventListener("DOMContentLoaded", async () => {
  const pwInput = document.getElementById("pw-input");
  const btn = document.getElementById("unlock-btn");
  pwInput.addEventListener("keydown", e => {
    if (e.key === "Enter") tryUnlock();
  });

  const savedPw = sessionStorage.getItem(REMEMBER_KEY);
  if (savedPw) {
    btn.disabled = true;
    btn.innerHTML = '<span class="lock-spinner"></span>자동으로 여는 중…';
    try {
      await unlockWithPassword(savedPw);
      return;
    } catch (e) {
      sessionStorage.removeItem(REMEMBER_KEY);
      btn.disabled = false;
      btn.textContent = "열기";
    }
  }
  pwInput.focus();
});

function renderApp() {
  // Babel 트랜스파일 후 앱 마운트
  const script = document.getElementById("app-script");
  Babel.transformScriptTags();
}

function normName(raw) {
  if (!raw || raw === "-") return "미기재";
  let s = raw.replace(/\(.*?\)/g, "").replace(/형제|자매/g, "").replace(/\s+/g, " ").trim();
  return s || "미기재";
}
function normCong(raw) {
  if (!raw || raw === "-" || !raw.trim()) return "회중 미기재";
  let s = raw.replace(/회중/g, "").replace(/경기/g, "").replace(/\s+/g, "").trim();
  if (s.includes(",")) s = s.split(",")[0];
  const map = [
    ["안성서운동부","서운동부"],["안성서운서부","서운서부"],
    ["안성남부","안성남부"],["안성북부","안성북부"],["안성중앙","안성중앙"],
    ["안성정봉","안성정봉"],["안성승두","안성승두"],
    ["서운동부","서운동부"],["서운서부","서운서부"],["진사","진사"],
  ];
  for (const [p,c] of map) if (s===p||s.startsWith(p)) return c;
  return s || "회중 미기재";
}

// 두 경험담(또는 이미 연결된 묶음)을 하나로 합친다.
// 양쪽에 진행 상태가 서로 다르게 이미 지정돼 있으면 확인 후 최근 것만 남긴다.
function performLink(fromId, toId, { groups, tracking, recordsById, groupIdOfRecord }) {
  if (!fromId || !toId || fromId === toId) return null;
  const gFrom = groupIdOfRecord[fromId] || null;
  const gTo   = groupIdOfRecord[toId] || null;

  const memberSet = new Set();
  if (gFrom && groups[gFrom]) groups[gFrom].members.forEach(id=>memberSet.add(id)); else memberSet.add(fromId);
  if (gTo && groups[gTo]) groups[gTo].members.forEach(id=>memberSet.add(id)); else memberSet.add(toId);
  const members = [...memberSet];

  const byDateDesc = (a,b) => (recordsById[b]?.date||"").localeCompare(recordsById[a]?.date||"");

  const candidateReps = [];
  if (gFrom && groups[gFrom]?.repId) candidateReps.push(groups[gFrom].repId);
  if (gTo && groups[gTo]?.repId && !candidateReps.includes(groups[gTo].repId)) candidateReps.push(groups[gTo].repId);
  [fromId, toId].forEach(id=>{
    if (!groupIdOfRecord[id] && tracking[id]?.status && tracking[id].status!=="none" && !candidateReps.includes(id)) candidateReps.push(id);
  });

  let repId;
  if (candidateReps.length === 0) {
    repId = [...members].sort(byDateDesc)[0];
  } else if (candidateReps.length === 1) {
    repId = candidateReps[0];
  } else {
    const [ra, rb] = candidateReps;
    const la = statusOf(tracking[ra]?.status).label, lb = statusOf(tracking[rb]?.status).label;
    const keep = window.confirm(
      "두 건 모두 진행 상태가 지정되어 있습니다.\n\n" +
      (recordsById[ra]?.date||"") + " (" + la + ")\n" + (recordsById[rb]?.date||"") + " (" + lb + ")\n\n" +
      "더 최근 건의 진행 상태만 남고 나머지는 사라집니다. 계속할까요?"
    );
    if (!keep) return null;
    repId = [ra, rb].sort(byDateDesc)[0];
  }

  const groupId = gFrom || gTo || ("g_"+repId+"_"+Date.now().toString(36));
  const group = {
    members: members.sort((a,b)=>(recordsById[a]?.date||"").localeCompare(recordsById[b]?.date||"")),
    repId,
    updatedAt: new Date().toISOString().slice(0,10),
  };

  const trackingPatches = {};
  members.forEach(id=>{
    if (id !== repId && tracking[id]?.status && tracking[id].status !== "none") {
      trackingPatches[id] = { status:"none", memo:"" };
    }
  });

  return {
    groupId, group,
    removeGroupIds: [gFrom, gTo].filter(g=>g && g!==groupId),
    trackingPatches,
  };
}

// 묶음에서 한 건만 빼낸다. 남는 게 1건 이하면 묶음 자체를 없앤다.
function performUnlink(id, { groups, groupIdOfRecord, recordsById, tracking }) {
  const gid = groupIdOfRecord[id];
  if (!gid || !groups[gid]) return null;
  const g = groups[gid];
  const remaining = g.members.filter(m=>m!==id);
  if (remaining.length <= 1) {
    return { groupId:null, group:null, removeGroupIds:[gid], trackingPatches:{} };
  }
  let repId = g.repId;
  if (repId === id) {
    const withStatus = remaining.filter(m=>tracking[m]?.status && tracking[m].status!=="none");
    repId = withStatus[0] || [...remaining].sort((a,b)=>(recordsById[b]?.date||"").localeCompare(recordsById[a]?.date||""))[0];
  }
  return {
    groupId: gid,
    group: { ...g, members: remaining, repId, updatedAt: new Date().toISOString().slice(0,10) },
    removeGroupIds: [],
    trackingPatches: {},
  };
}

function App() {
  const records = DATA; // injected after decryption
  const [tab,setTab]                   = useState("people");
  const [groupBy,setGroupBy]           = useState("person");
  const [sortBy,setSortBy]             = useState("count");
  const [selectedPerson,setSelectedPerson] = useState(null);
  const [selectedCong,setSelectedCong]     = useState(null);
  const [monthFilter,setMonthFilter]   = useState("전체");
  const [search,setSearch]             = useState("");
  const [trackedOnly,setTrackedOnly]   = useState(false);
  const [tracking,setTracking]         = useState({});
  const [loaded,setLoaded]             = useState(false);
  const [loadError,setLoadError]       = useState(false);
  const [saveState,setSaveState]       = useState("idle");
  const [expanded,setExpanded]         = useState({});
  const [groups,setGroups]             = useState({});
  const [linkingFrom,setLinkingFrom]   = useState(null);

  useEffect(() => {
    apiLoad().then(t=>{setTracking(t||{});setLoaded(true);}).catch(()=>{setLoadError(true);setLoaded(true);});
    apiLoadGroups().then(g=>setGroups(g||{})).catch(()=>{});
  }, []);

  const updateEntry = useCallback((id, patch) => {
    setTracking(prev => {
      const cur = prev[id]||{};
      const entry = {...cur,...patch, updatedAt: new Date().toISOString().slice(0,10)};
      const next = {...prev,[id]:entry};
      setSaveState("saving");
      apiSave(id,entry).then(ok=>setSaveState(ok?"idle":"error")).catch(()=>setSaveState("error"));
      return next;
    });
  }, []);

  const isTracked = id => { const s=tracking[id]?.status; return s&&s!=="none"; };

  const recordsById = useMemo(()=>{ const m={}; records.forEach(r=>{m[r.id]=r;}); return m; }, []);
  const groupIdOfRecord = useMemo(()=>{
    const m={};
    Object.entries(groups).forEach(([gid,g])=>{ (g.members||[]).forEach(id=>{ m[id]=gid; }); });
    return m;
  }, [groups]);

  // 연결(그룹) 정보 저장 — 진행상태가 이미 pending patch로 남아있는 상태에서 호출됨
  const applyGroupUpdate = useCallback((result) => {
    if (!result) return;
    setGroups(prev => {
      const next = {...prev};
      (result.removeGroupIds||[]).forEach(gid=>{ delete next[gid]; apiDeleteGroup(gid); });
      if (result.groupId && result.group) { next[result.groupId]=result.group; apiSaveGroup(result.groupId, result.group); }
      return next;
    });
    Object.entries(result.trackingPatches||{}).forEach(([id,patch])=>updateEntry(id,patch));
  }, [updateEntry]);

  const startLink   = id => setLinkingFrom(prev => prev===id ? null : id);
  const cancelLink  = () => setLinkingFrom(null);
  const confirmLink = targetId => {
    const result = performLink(linkingFrom, targetId, { groups, tracking, recordsById, groupIdOfRecord });
    setLinkingFrom(null);
    applyGroupUpdate(result);
  };
  const unlinkRecord = id => {
    const result = performUnlink(id, { groups, groupIdOfRecord, recordsById, tracking });
    applyGroupUpdate(result);
  };

  const getLinkMeta = useCallback((rec) => {
    const gid = groupIdOfRecord[rec.id];
    if (!gid || !groups[gid]) return { grouped:false };
    const g = groups[gid];
    const isRep = g.repId === rec.id;
    const repRecord = recordsById[g.repId] || rec;
    const otherMembers = g.members.filter(id=>id!==rec.id).map(id=>recordsById[id]).filter(Boolean);
    return { grouped:true, groupId:gid, isRep, repRecord, otherMembers, repStatus: tracking[g.repId] };
  }, [groups, groupIdOfRecord, recordsById, tracking]);

  const renderCard = (r) => (
    <RecordCard key={r.id} r={r} t={tracking[r.id]} expanded={!!expanded[r.id]}
      onToggleExpand={()=>setExpanded(e=>({...e,[r.id]:!e[r.id]}))}
      onStatus={s=>updateEntry(r.id,{status:s})} onMemo={m=>updateEntry(r.id,{memo:m})}
      link={getLinkMeta(r)} linkingFrom={linkingFrom}
      onStartLink={()=>startLink(r.id)} onCancelLink={cancelLink}
      onPickAsTarget={()=>confirmLink(r.id)} onUnlink={()=>unlinkRecord(r.id)} />
  );

  const people = useMemo(()=>{
    const map={};
    records.forEach(r=>{
      const n=normName(r.name);
      if(!map[n]) map[n]={key:n,name:n,congs:new Set(),records:[]};
      map[n].records.push(r);
      const c=normCong(r.cong); if(c!=="회중 미기재") map[n].congs.add(c);
    });
    return Object.values(map);
  },[]);

  const congs = useMemo(()=>{
    const map={};
    records.forEach(r=>{
      const c=normCong(r.cong);
      if(!map[c]) map[c]={key:c,name:c,names:new Set(),records:[]};
      map[c].records.push(r); map[c].names.add(normName(r.name));
    });
    return Object.values(map);
  },[]);

  const sortGroups = gs => {
    const a=[...gs];
    if(sortBy==="name") a.sort((a,b)=>a.name.localeCompare(b.name,"ko"));
    else a.sort((a,b)=>b.records.length-a.records.length||a.name.localeCompare(b.name,"ko"));
    return a;
  };

  const filteredRecords = useMemo(()=>{
    let r=records;
    if(selectedPerson) r=r.filter(x=>normName(x.name)===selectedPerson);
    if(selectedCong)   r=r.filter(x=>normCong(x.cong)===selectedCong);
    if(monthFilter!=="전체") r=r.filter(x=>x.month===monthFilter);
    if(trackedOnly) r=r.filter(x=>{const s=tracking[x.id]?.status; return s&&s!=="none";});
    if(search.trim()){const q=search.trim(); r=r.filter(x=>x.name.includes(q)||x.place.includes(q)||x.situation.includes(q)||x.response.includes(q)||x.keyword.includes(q)||x.cong.includes(q));}
    return [...r].sort((a,b)=>a.date<b.date?1:-1);
  },[selectedPerson,selectedCong,monthFilter,search,trackedOnly,tracking]);

  const trackedRecords = useMemo(()=>records.filter(r=>tracking[r.id]?.status&&tracking[r.id].status!=="none"),[tracking]);
  const stats = useMemo(()=>{
    const by={}; STATUSES.forEach(s=>by[s.key]=0);
    trackedRecords.forEach(r=>{const k=tracking[r.id]?.status||"none"; by[k]=(by[k]||0)+1;});
    return by;
  },[trackedRecords,tracking]);

  if(!loaded) return <div style={ui.page}><div style={{padding:60,textAlign:"center",color:"#6B7280"}}>자료를 불러오는 중…</div></div>;

  return (
    <div style={ui.page}>
      <header style={ui.header}>
        <div>
          <div style={ui.eyebrow}>순회구 특별 공개 증거</div>
          <h1 style={ui.title}>경험담 관리 대장</h1>
        </div>
        <div style={ui.headerMeta}>
          <span>총 {records.length}건</span><span style={ui.dot}>·</span>
          <span>관리 중 {trackedRecords.length}건</span>
          {saveState==="saving"&&<span style={{color:"#B45309"}}> · 저장 중…</span>}
          {saveState==="error"&&<span style={{color:"#DC2626"}}> · 저장 실패</span>}
          {!FIREBASE_ENABLED&&<span style={{color:"#9CA3AF"}}> · 이 기기 저장</span>}
        </div>
      </header>

      {loadError&&<div style={ui.warnBar}>저장된 진행 상태를 불러오지 못했습니다.</div>}

      {linkingFrom&&(
        <div style={ui.linkBanner}>
          <span>🔗 <b>{recordsById[linkingFrom]?.date}</b> {normName(recordsById[linkingFrom]?.name||"")} 경험담과 연결할 카드를 탭하세요.</span>
          <button style={ui.linkBannerBtn} onClick={cancelLink}>취소</button>
        </div>
      )}

      <nav style={ui.tabs}>
        {[["people","분류별 보기"],["all","전체 경험담"],["board","관리 현황판"]].map(([k,label])=>(
          <button key={k} onClick={()=>{setTab(k);if(k!=="people"){setSelectedPerson(null);setSelectedCong(null);}}}
            style={{...ui.tabBtn,...(tab===k?ui.tabBtnActive:{})}}>
            {label}{k==="board"&&trackedRecords.length>0&&<span style={ui.tabBadge}>{trackedRecords.length}</span>}
          </button>
        ))}
      </nav>

      {tab==="people"&&!selectedPerson&&!selectedCong&&(
        <div>
          <div style={ui.controlRow}>
            <div style={ui.groupToggle}>
              <button onClick={()=>setGroupBy("person")} style={{...ui.groupBtn,...(groupBy==="person"?ui.groupBtnActive:{})}}>전도인별</button>
              <button onClick={()=>setGroupBy("cong")}   style={{...ui.groupBtn,...(groupBy==="cong"  ?ui.groupBtnActive:{})}}>회중별</button>
            </div>
            <div style={ui.groupToggle}>
              <button onClick={()=>setSortBy("count")} style={{...ui.groupBtn,...(sortBy==="count"?ui.groupBtnActive:{})}}>경험담 많은 순</button>
              <button onClick={()=>setSortBy("name")}  style={{...ui.groupBtn,...(sortBy==="name" ?ui.groupBtnActive:{})}}>가나다순</button>
            </div>
          </div>
          <input style={ui.search} placeholder={groupBy==="person"?"전도인 이름 검색…":"회중 이름 검색…"} value={search} onChange={e=>setSearch(e.target.value)} />
          <div style={ui.peopleGrid}>
            {sortGroups(groupBy==="person"?people:congs).filter(g=>!search.trim()||g.name.includes(search.trim())).map(g=>{
              const tc=g.records.filter(r=>tracking[r.id]?.status&&tracking[r.id].status!=="none").length;
              const sub=groupBy==="person"?[...g.congs].slice(0,2).join(", "):`전도인 ${g.names.size}명`;
              return (
                <button key={g.key} style={ui.personCard}
                  onClick={()=>{if(groupBy==="person")setSelectedPerson(g.key);else setSelectedCong(g.key);setSearch("");}}>
                  <div style={ui.personName}>{g.name}</div>
                  <div style={ui.personMeta}>경험담 {g.records.length}건{tc>0&&<span style={{color:"#B45309"}}> · 관리 {tc}</span>}</div>
                  <div style={ui.personCong}>{sub}</div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {((tab==="people"&&(selectedPerson||selectedCong))||tab==="all")&&(
        <div>
          {(selectedPerson||selectedCong)&&(
            <div style={ui.personHeader}>
              <button style={ui.backBtn} onClick={()=>{setSelectedPerson(null);setSelectedCong(null);}}>← {groupBy==="person"?"전도인":"회중"} 목록</button>
              <h2 style={ui.personTitle}>{selectedPerson||selectedCong}</h2>
            </div>
          )}
          <div style={ui.filterRow}>
            <select style={ui.select} value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}>
              <option value="전체">전체 기간</option>
              {MONTH_ORDER.map(m=><option key={m} value={m}>{monthShort(m)}</option>)}
            </select>
            <input style={{...ui.search,marginBottom:0,flex:1,minWidth:140}} placeholder="장소·내용·키워드…" value={search} onChange={e=>setSearch(e.target.value)} />
            <label style={ui.checkLabel}><input type="checkbox" checked={trackedOnly} onChange={e=>setTrackedOnly(e.target.checked)} />관리 중만</label>
          </div>
          <div style={ui.countLine}>{filteredRecords.length}건</div>
          {filteredRecords.map(renderCard)}
          {filteredRecords.length===0&&<div style={ui.empty}>조건에 맞는 경험담이 없습니다.</div>}
        </div>
      )}

      {tab==="board"&&(
        <div>
          <div style={ui.statRow}>
            {STATUSES.filter(s=>s.key!=="none").map(s=>(
              <div key={s.key} style={{...ui.statCard,borderTop:`3px solid ${s.color}`}}>
                <div style={{fontSize:22,fontWeight:700,color:s.color}}>{stats[s.key]||0}</div>
                <div style={{fontSize:12,color:"#6B7280"}}>{s.label}</div>
              </div>
            ))}
          </div>
          {trackedRecords.length===0&&<div style={ui.empty}>아직 진행 상태를 지정한 경험담이 없습니다.<br />경험담 목록에서 재방문·성서연구로 이어질 가능성이 있는 건의 진행 상태를 지정하면 여기에 자동으로 모입니다.</div>}
          {STATUSES.filter(s=>s.key!=="none").map(s=>{
            const recs=trackedRecords.filter(r=>(tracking[r.id]?.status||"none")===s.key);
            if(!recs.length) return null;
            return (
              <div key={s.key} style={{marginBottom:28}}>
                <h3 style={{...ui.boardHeading,color:s.color}}>{s.label} <span style={{color:"#9CA3AF",fontWeight:400}}>{recs.length}건</span></h3>
                {recs.map(renderCard)}
              </div>
            );
          })}
        </div>
      )}

      <footer style={ui.footer}>
        {FIREBASE_ENABLED?"진행 상태·메모는 Firebase에 저장되어 위원회가 함께 봅니다."}
        <br /><span style={{color:"#C0392B"}}>개인정보가 포함되어 있습니다. 링크·파일은 위원회 안에서만 공유해 주세요.</span>
      </footer>
    </div>
  );
}

function RecordCard({ r, t, expanded, onToggleExpand, onStatus, onMemo, link, linkingFrom, onStartLink, onCancelLink, onPickAsTarget, onUnlink }) {
  const grouped = link && link.grouped;
  const isRep = !grouped || link.isRep;
  const statusEntry = grouped ? link.repStatus : t;
  const tracked = statusEntry?.status && statusEntry.status !== "none";
  const status  = statusOf(statusEntry?.status);
  const [memoDraft, setMemoDraft] = useState(statusEntry?.memo || "");
  useEffect(() => setMemoDraft(statusEntry?.memo || ""), [statusEntry?.memo]);

  const isLinkSource  = linkingFrom === r.id;
  const linkingActive = !!linkingFrom;
  const isPickTarget  = linkingActive && !isLinkSource;

  return (
    <div
      style={{...ui.card,...(tracked?ui.cardFlagged:{}),...(isLinkSource?ui.cardLinkSource:{}),...(isPickTarget?ui.cardPickable:{})}}
      onClick={isPickTarget?onPickAsTarget:undefined}>
      {isPickTarget&&<div style={ui.pickHint}>탭해서 이 경험담과 연결 →</div>}
      <div style={ui.cardTop}>
        <div style={{flex:1,minWidth:0}}>
          <div style={ui.cardMeta}>{r.date} · {monthShort(r.month)} #{r.num} · {normCong(r.cong)}</div>
          <div style={ui.cardName}>{normName(r.name)}<span style={ui.cardPlace}> — {r.place}</span></div>
          {r.keyword&&<span style={ui.keywordChip}>{r.keyword}</span>}
          {tracked&&<span style={{...ui.statusChip,color:status.color,background:status.bg}}>{status.label}</span>}
          {grouped&&<span style={ui.linkChip}>🔗 {link.otherMembers.length}건과 연결됨</span>}
        </div>
        {!linkingActive&&<button style={ui.linkBtn} onClick={e=>{e.stopPropagation();onStartLink();}}>🔗 연결</button>}
        {isLinkSource&&<button style={ui.linkCancelBtn} onClick={e=>{e.stopPropagation();onCancelLink();}}>취소</button>}
      </div>
      <div style={ui.cardBody}>
        <p style={ui.situText}>{r.situation||"(상황 미기재)"}</p>
        {expanded&&(
          <div>
            {r.response&&<div style={ui.section}><div style={ui.sectionLabel}>응대</div><p style={ui.bodyText}>{r.response}</p></div>}
            {r.feeling&&r.feeling!=="-"&&<div style={ui.section}><div style={ui.sectionLabel}>느낀점</div><p style={ui.bodyText}>{r.feeling}</p></div>}
          </div>
        )}
        <button style={ui.expandBtn} onClick={e=>{e.stopPropagation();onToggleExpand();}}>{expanded?"접기 ▲":"자세히 보기 ▼"}</button>
      </div>

      {grouped&&(
        <div style={ui.linkBox}>
          <div style={ui.linkBoxLabel}>🔗 연결된 경험담</div>
          <div style={ui.linkChips}>
            {link.otherMembers.map(m=>(
              <span key={m.id} style={ui.linkMemberChip}>{m.date}{m.id===link.repRecord.id?" · 진행상태 관리":""}</span>
            ))}
          </div>
          <button style={ui.unlinkBtn} onClick={e=>{e.stopPropagation();onUnlink();}}>이 건만 연결 해제</button>
        </div>
      )}

      {isRep ? (
        <div style={ui.trackBox}>
          <div style={ui.trackRow}>
            <span style={ui.trackLabel}>진행 상태</span>
            <div style={ui.statusBtns}>
              {STATUSES.map(s=>(
                <button key={s.key} onClick={e=>{e.stopPropagation();onStatus(s.key);}}
                  style={{...ui.statusBtn,...(statusEntry?.status===s.key||(!statusEntry?.status&&s.key==="none")?{background:s.bg,color:s.color,borderColor:s.color,fontWeight:700}:{})}}>
                  {s.label}
                </button>
              ))}
            </div>
          </div>
          {tracked&&(
            <div style={ui.trackRow}>
              <span style={ui.trackLabel}>메모</span>
              <input style={ui.memoInput} placeholder="예: 7/10 재방 약속" value={memoDraft}
                onClick={e=>e.stopPropagation()}
                onChange={e=>setMemoDraft(e.target.value)}
                onBlur={()=>{if(memoDraft!==(statusEntry?.memo||""))onMemo(memoDraft);}} />
            </div>
          )}
          {tracked&&statusEntry?.updatedAt&&<div style={ui.updatedAt}>마지막 수정: {statusEntry.updatedAt}</div>}
        </div>
      ) : (
        <div style={ui.trackBoxReadonly}>
          진행 상태는 <b>{link.repRecord.date}</b> 경험담에서 함께 관리합니다.
          {tracked&&<span style={{...ui.statusChip,color:status.color,background:status.bg,marginLeft:6}}>{status.label}</span>}
        </div>
      )}
    </div>
  );
}
